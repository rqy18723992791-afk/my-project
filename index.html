<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THU-Style 数字化图书管理平台</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
       body { font-family: 'Inter', 'PingFang SC', sans-serif; }
        .thu-purple { background: linear-gradient(135deg, #6b21a8 0%, #4338ca 100%); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .book-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .animate-in { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">  
        // Supabase 连接信息
        const SUPABASE_URL = 'https://agakzhlswzimjylewvcg.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_YzYzzdOVSQzaNr1s3KjtLQ_KyHXfs5P';
        const supabase = (window.supabasejs || window.supabase).createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const DB_KEY = "THU_LIB_V4_DATA"; // 更新了本地存储的 KEY
        const DRAFT_KEY = "ADD_BOOK_DRAFT";

        // 读者类型及额度配置
        const READER_TYPES = {
            'UNDERGRAD': { label: '本科生', limit: 10 },
            'POSTGRAD': { label: '研究生', limit: 20 },
            'STAFF': { label: '教职工', limit: 30 },
            'ADMIN': { label: '管理员', limit: 99 }
        };

        // 初始数据
        const INITIAL_DB = {
            users: [
                { 
                    id: '18723992791', account: '18723992791', password: 'rqy18723992791', 
                    role: 'ADMIN', name: '系统管理员', department: '图书馆', 
                    phone: '18723992791', email: 'admin@thu.edu.cn',
                    readerType: 'ADMIN', status: 'ACTIVE' 
                }
            ],
            borrowings: []
        };

        function App() {
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem("USER_SESSION");
                return saved ? JSON.parse(saved) : null;
            });

            // 初始化本地数据库（混合 Supabase 和 LocalStorage）
            const [db, setDb] = useState(() => {
                const savedDB = localStorage.getItem(DB_KEY);
                return savedDB ? { ...JSON.parse(savedDB), books: [] } : { ...INITIAL_DB, books: [] };
            });

            // 持久化用户和借阅记录到本地
            useEffect(() => {
                const dataToSave = { users: db.users, borrowings: db.borrowings };
                localStorage.setItem(DB_KEY, JSON.stringify(dataToSave));
            }, [db.users, db.borrowings]);

            // 从云端获取图书
            useEffect(() => {
                const fetchBooks = async () => {
                    const { data, error } = await supabase.from('books').select('*').order('created_at', { ascending: false });
                    if (!error && data) {
                        setDb(prev => ({ ...prev, books: data }));
                    }
                };

                fetchBooks();

                const channel = supabase.channel('books_realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'books' }, 
                        () => { fetchBooks(); })
                    .subscribe();

                return () => { supabase.removeChannel(channel); };
            }, []);

            const login = (u) => {
                if (u.status !== 'ACTIVE') {
                    alert("您的账号已被冻结或注销，请联系管理员！");
                    return;
                }
                setUser(u);
                localStorage.setItem("USER_SESSION", JSON.stringify(u));
            };

            const logout = () => {
                setUser(null);
                localStorage.removeItem("USER_SESSION");
            };

            return (
                <div className="min-h-screen">
                    {user ? (
                        <Dashboard user={user} db={db} setDb={setDb} onLogout={logout} />
                    ) : (
                        <LoginPage onLogin={login} db={db} setDb={setDb} />
                    )}
                </div>
            );
        }

        // --- 登录与注册页面 ---
        function LoginPage({ onLogin, db, setDb }) {
            const [isRegister, setIsRegister] = useState(false);
            const [form, setForm] = useState({ acc: '', pw: '', name: '', dept: '', type: 'UNDERGRAD', phone: '' });

            const handleLogin = () => {
                const found = db.users.find(u => u.account === form.acc && u.password === form.pw);
                if(found) onLogin(found); else alert("账号或密码错误");
            };

            const handleRegister = () => {
                if(!form.acc || !form.pw || !form.name) return alert("请填写必填项");
                if(db.users.find(u => u.account === form.acc)) return alert("学号/工号已存在");

                const newUser = {
                    id: Date.now().toString(),
                    account: form.acc,
                    password: form.pw,
                    role: 'READER',
                    name: form.name,
                    department: form.dept || '未知院系',
                    phone: form.phone || '',
                    readerType: form.type,
                    status: 'ACTIVE'
                };
                setDb(prev => ({ ...prev, users: [...prev.users, newUser] }));
                alert("注册成功！请登录。");
                setIsRegister(false);
                setForm({ acc: '', pw: '', name: '', dept: '', type: 'UNDERGRAD', phone: '' });
            };

            return (
                <div className="h-screen flex items-center justify-center bg-slate-900 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full opacity-30 pointer-events-none">
                        <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-purple-600 blur-[120px] rounded-full"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-blue-600 blur-[120px] rounded-full"></div>
                    </div>
                    <div className="w-[420px] p-10 glass rounded-[2.5rem] shadow-2xl relative z-10 animate-in">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-black tracking-tighter text-slate-800">小羽书屋</h1>
                            <p className="text-slate-500 text-sm mt-2">{isRegister ? '新读者注册通道' : '数字化馆藏资源管理门户'}</p>
                        </div>
                        
                        {!isRegister ? (
                            <div className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">账号</label>
                                    <input value={form.acc} onChange={e=>setForm({...form, acc: e.target.value})} className="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none focus:ring-2 ring-purple-500 transition-all" placeholder="输入学号/工号" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">密码</label>
                                    <input type="password" value={form.pw} onChange={e=>setForm({...form, pw: e.target.value})} className="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none focus:ring-2 ring-purple-500 transition-all" placeholder="请输入密码" />
                                </div>
                                <button onClick={handleLogin} className="w-full py-4 thu-purple text-white rounded-2xl font-bold shadow-xl shadow-purple-200 mt-6 hover:scale-[1.02] active:scale-95 transition-all">
                                    立即进入系统
                                </button>
                                <p className="text-center text-sm text-slate-500 mt-4 cursor-pointer hover:text-purple-600" onClick={()=>setIsRegister(true)}>没有账号？点此注册</p>
                            </div>
                        ) : (
                            <div className="space-y-3 h-[400px] overflow-y-auto no-scrollbar pr-2">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">学号/工号 *</label>
                                    <input value={form.acc} onChange={e=>setForm({...form, acc: e.target.value})} className="w-full p-3 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-purple-500" placeholder="作为登录账号" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">真实姓名 *</label>
                                    <input value={form.name} onChange={e=>setForm({...form, name: e.target.value})} className="w-full p-3 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-purple-500" placeholder="您的姓名" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">密码 *</label>
                                    <input type="password" value={form.pw} onChange={e=>setForm({...form, pw: e.target.value})} className="w-full p-3 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-purple-500" placeholder="设置密码" />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">读者类型</label>
                                        <select value={form.type} onChange={e=>setForm({...form, type: e.target.value})} className="w-full p-3 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-purple-500">
                                            <option value="UNDERGRAD">本科生</option>
                                            <option value="POSTGRAD">研究生</option>
                                            <option value="STAFF">教职工</option>
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">院系/部门</label>
                                        <input value={form.dept} onChange={e=>setForm({...form, dept: e.target.value})} className="w-full p-3 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-purple-500" placeholder="如: 计算机系" />
                                    </div>
                                </div>
                                <button onClick={handleRegister} className="w-full py-4 thu-purple text-white rounded-2xl font-bold mt-4 hover:scale-[1.02] active:scale-95 transition-all">
                                    提交注册信息
                                </button>
                                <p className="text-center text-sm text-slate-500 mt-2 cursor-pointer hover:text-purple-600" onClick={()=>setIsRegister(false)}>返回登录</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- 主体框架 ---
        function Dashboard({ user, db, setDb, onLogout }) {
            const [view, setView] = useState(user.role === 'ADMIN' ? 'admin_home' : 'reader_home');
            const [search, setSearch] = useState('');
            const filteredBooks = db.books.filter(b => b.title.includes(search) || b.isbn.includes(search) || b.author.includes(search));

            const borrowBook = (book) => {
                if(user.status !== 'ACTIVE') return alert("您的账号状态异常，暂无借阅权限！");
                if(book.available <= 0) return alert("暂无库存，请留意归还动态");
                
                // 额度检查
                const userCurrentBorrowings = db.borrowings.filter(b => b.userId === user.id && b.status === 'BORROWED').length;
                const limit = READER_TYPES[user.readerType || 'UNDERGRAD']?.limit || 5;
                if(userCurrentBorrowings >= limit) {
                    return alert(`您当前的读者类型（${READER_TYPES[user.readerType]?.label}）最大借阅额度为 ${limit} 本，已达上限！`);
                }

                const newBooks = db.books.map(b => b.id === book.id ? {...b, available: b.available - 1} : b);
                
                // 模拟应还日期（30天后）
                const dueDate = new Date();
                dueDate.setDate(dueDate.getDate() + 30);

                const newBorrow = { 
                    id: Date.now().toString(), 
                    userId: user.id, 
                    bookId: book.id,
                    bookTitle: book.title, 
                    date: new Date().toLocaleDateString(), 
                    due: dueDate.toLocaleDateString(),
                    status: 'BORROWED' // BORROWED, RETURNED
                };
                
                setDb({...db, books: newBooks, borrowings: [newBorrow, ...db.borrowings]});
                alert("预约/借阅成功！请在规定时间内归还。");
            };

            const deleteBook = async (bookId) => {
                if (!confirm("确定要下架并删除这本图书吗？")) return;
                const { error } = await supabase.from('books').delete().eq('id', bookId);
                if (error) alert("删除失败：" + error.message);
                else alert("✅ 图书已成功删除！");
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className="w-72 border-r bg-white p-8 flex flex-col z-20 shadow-sm">
                        <div className="flex items-center gap-3 mb-10">
                                    {/* ⬇️ 这里换成你的本地图片 ⬇️ */}
                                <img 
                                 src="my-logo.png" 
                                 alt="Logo" 
                                 className="w-12 h-12 rounded-xl object-cover shadow-lg shadow-purple-100" />
                                <h2 className="text-xl font-black tracking-tighter">小羽书屋</h2>
                        </div>

                        <div className="flex-1 space-y-1.5">
                            <NavBtn icon="home" label="系统首页" active={view.includes('home')} onClick={()=>setView(user.role === 'ADMIN' ? 'admin_home' : 'reader_home')} />
                            <NavBtn icon="search" label="馆藏检索" active={view === 'search'} onClick={()=>setView('search')} />
                            <NavBtn icon="bookmark" label="我的借阅" active={view === 'my'} onClick={()=>setView('my')} />
                            
                            {user.role === 'ADMIN' && (
                                <div className="mt-8 pt-6 border-t border-slate-100">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase mb-3 px-4 tracking-widest">馆务管理</p>
                                    <NavBtn icon="plus-circle" label="图书入库编目" active={view === 'add'} onClick={()=>setView('add')} />
                                    <NavBtn icon="users" label="读者信息管理" active={view === 'users'} onClick={()=>setView('users')} />
                                </div>
                            )}
                        </div>

                        <div className="mt-auto pt-6 border-t border-slate-100">
                            <div className="flex items-center gap-3 mb-4 px-4 bg-slate-50 p-3 rounded-2xl">
                                <div className="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center font-bold text-purple-700">{user.name[0]}</div>
                                <div className="min-w-0">
                                    <p className="text-sm font-bold truncate text-slate-800">{user.name}</p>
                                    <p className="text-[10px] text-purple-600 font-bold tracking-tight uppercase">{user.role === 'ADMIN' ? '管理员' : READER_TYPES[user.readerType]?.label}</p>
                                </div>
                            </div>
                            <button onClick={onLogout} className="w-full py-3 bg-white border border-red-100 text-red-500 rounded-xl text-xs font-bold hover:bg-red-50 transition-colors flex items-center justify-center gap-2">
                                <Icon name="log-out" size={14} /> 安全登出
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto bg-slate-50 p-12">
                        {view === 'reader_home' && <ReaderHome db={db} setView={setView} user={user} />}
                        {view === 'admin_home' && <AdminHome db={db} />}
                        {view === 'search' && <SearchView books={filteredBooks} onBorrow={borrowBook} search={search} setSearch={setSearch} user={user} deleteBook={deleteBook} />}
                        {view === 'my' && <MyBorrowings db={db} userId={user.id} />}
                        {view === 'add' && <AddBook setDb={setDb} />}
                        {view === 'users' && <UsersManagement db={db} setDb={setDb} />}
                    </main>
                </div>
            );
        }

        // --- 子视图组件 ---

        function ReaderHome({ db, setView, user }) {
            const myBorrows = db.borrowings.filter(b => b.userId === user.id && b.status === 'BORROWED').length;
            const limit = READER_TYPES[user.readerType || 'UNDERGRAD']?.limit || 5;

            return (
                <div className="animate-in max-w-6xl mx-auto">
                    <div className="thu-purple p-12 rounded-[3rem] text-white relative overflow-hidden mb-12 shadow-2xl shadow-purple-200">
                        <div className="relative z-10 flex justify-between items-center">
                            <div>
                                <h2 className="text-4xl font-black mb-4 tracking-tighter">你好，{user.name} 同学</h2>
                                <p className="text-purple-100 max-w-md leading-relaxed opacity-90 font-medium">
                                    “书山有路勤为径，学海无涯苦作舟。” <br/>
                                    您当前的借阅额度为 {myBorrows} / {limit} 本。
                                </p>
                                <button onClick={()=>setView('search')} className="mt-8 px-8 py-3 bg-white text-purple-700 rounded-xl font-bold text-sm hover:scale-105 transition-transform flex items-center gap-2">
                                    <Icon name="search" size={16} /> 立即探索馆藏
                                </button>
                            </div>
                            <div className="hidden lg:block text-right pr-10">
                                <div className="text-6xl font-black text-white/20 mb-2">{new Date().getDate()}</div>
                                <div className="text-xl font-bold text-white/60">{new Date().toLocaleString('zh-CN', { month: 'long', weekday: 'long' })}</div>
                            </div>
                        </div>
                        <Icon name="book-open" size={240} className="absolute right-[-40px] bottom-[-60px] opacity-10 rotate-[-15deg]" />
                    </div>

                    <div className="flex items-center justify-between mb-8 px-2">
                        <h3 className="text-2xl font-black flex items-center gap-3 text-slate-800">
                            <div className="w-2 h-8 bg-purple-600 rounded-full shadow-lg shadow-purple-200"></div>
                            新书速递
                        </h3>
                        <button onClick={()=>setView('search')} className="text-sm font-bold text-purple-600 hover:text-purple-800">查看全部图书 →</button>
                    </div>
                    
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                        {db.books.slice(0, 5).map(b => (
                            <div key={b.id} onClick={()=>setView('search')} className="book-card bg-white p-4 rounded-3xl border border-slate-100 transition-all cursor-pointer group">
                                <div className="relative overflow-hidden rounded-2xl mb-4 shadow-sm group-hover:shadow-lg transition-all aspect-[3/4]">
                                    <img src={b.cover} className="w-full h-full object-cover" />
                                    {b.available === 0 && (
                                        <div className="absolute inset-0 bg-black/40 flex items-center justify-center">
                                            <span className="px-3 py-1 bg-white/90 text-slate-800 text-xs font-bold rounded-full">已借罄</span>
                                        </div>
                                    )}
                                </div>
                                <h4 className="font-bold text-slate-800 truncate text-sm">{b.title}</h4>
                                <p className="text-[10px] text-slate-400 font-bold uppercase mt-1 truncate">{b.author}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // --- 核心：读者管理模块 ---
        function UsersManagement({ db, setDb }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [editingUser, setEditingUser] = useState(null);
            const [showForm, setShowForm] = useState(false);

            // 过滤读者（排除当前管理员自己，或按需显示全部）
            const filteredUsers = useMemo(() => {
                return db.users.filter(u => 
                    u.name.includes(searchTerm) || 
                    u.account.includes(searchTerm) || 
                    u.department.includes(searchTerm)
                );
            }, [db.users, searchTerm]);

            const handleDelete = (id) => {
                if(confirm("确定要删除该读者吗？所有借阅记录将失去关联！")) {
                    setDb(prev => ({ ...prev, users: prev.users.filter(u => u.id !== id) }));
                }
            };

            const toggleStatus = (user) => {
                const newStatus = user.status === 'ACTIVE' ? 'FROZEN' : 'ACTIVE';
                const action = newStatus === 'FROZEN' ? "冻结" : "激活";
                if(confirm(`确定要${action}读者 ${user.name} 吗？`)) {
                    setDb(prev => ({
                        ...prev, 
                        users: prev.users.map(u => u.id === user.id ? {...u, status: newStatus} : u)
                    }));
                }
            };

            const resetPassword = (user) => {
                if(confirm(`将 ${user.name} 的密码重置为学号/工号后六位？`)) {
                    const newPw = user.account.slice(-6);
                    setDb(prev => ({
                        ...prev, 
                        users: prev.users.map(u => u.id === user.id ? {...u, password: newPw} : u)
                    }));
                    alert(`重置成功！新密码为：${newPw}`);
                }
            };

            const handleSaveForm = (formData) => {
                if(editingUser) {
                    setDb(prev => ({
                        ...prev,
                        users: prev.users.map(u => u.id === editingUser.id ? { ...u, ...formData } : u)
                    }));
                } else {
                    const newUser = {
                        id: Date.now().toString(),
                        password: formData.account.slice(-6), // 默认密码
                        status: 'ACTIVE',
                        role: formData.role || 'READER',
                        ...formData
                    };
                    setDb(prev => ({ ...prev, users: [newUser, ...prev.users] }));
                }
                setShowForm(false);
                setEditingUser(null);
            };

            const exportCSV = () => {
                const headers = ["学号/工号", "姓名", "院系", "类型", "联系电话", "状态"];
                const rows = filteredUsers.map(u => [
                    u.account, u.name, u.department, 
                    READER_TYPES[u.readerType]?.label || '未知', 
                    u.phone || '-', u.status === 'ACTIVE' ? '正常' : '冻结'
                ]);
                const csvContent = "data:text/csv;charset=utf-8,\uFEFF" 
                    + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
                
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `读者名册_${new Date().toLocaleDateString()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="animate-in max-w-6xl mx-auto">
                    <div className="flex justify-between items-end mb-8">
                        <div>
                            <h2 className="text-3xl font-black text-slate-800">读者信息管理</h2>
                            <p className="text-slate-500 text-sm mt-2">共 {filteredUsers.length} 位注册读者在册</p>
                        </div>
                        <div className="flex gap-3">

        // 【重点优化】AddBook 组件 - 增加 Loading、文件名安全处理、ISBN 重复提示
        function AddBook({ setDb }) {
            const [f, setF] = useState(() => {
                const savedDraft = localStorage.getItem(DRAFT_KEY);
                return savedDraft ? JSON.parse(savedDraft) : { title: '', isbn: '', author: '', category: '计算机科学', total: 5, cover: '', location: '' };
            });

            const [pdfFile, setPdfFile] = useState(null);
            const [isUploading, setIsUploading] = useState(false);   // 新增：上传 Loading 状态

            useEffect(() => { localStorage.setItem(DRAFT_KEY, JSON.stringify(f)); }, [f]);

            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => setF(prev => ({ ...prev, cover: ev.target.result }));
                reader.readAsDataURL(file);
            };

            // 【优化后的 submit 函数】
            const submit = async (e) => {
                e.preventDefault();
                if (!f.title || !f.isbn) return alert("书名和 ISBN 不能为空");

                // 1. ISBN 重复检查（友好提示）
                const { data: existing } = await supabase
                    .from('books')
                    .select('id')
                    .eq('isbn', f.isbn)
                    .maybeSingle();

                if (existing) {
                    return alert("该书已存在，请检查 ISBN");
                }

                setIsUploading(true);

                let finalPdfUrl = '';

                try {
                    // 2. PDF 上传（文件名安全处理：仅保留后缀）
                    if (pdfFile) {
                        const ext = pdfFile.name.split('.').pop() || 'pdf';
                        const filePath = `book_${Date.now()}.${ext}`;

                        const { error: uploadError } = await supabase.storage
                            .from('books-pdf')
                            .upload(filePath, pdfFile);

                        if (uploadError) throw uploadError;

                        const { data: urlData } = supabase.storage.from('books-pdf').getPublicUrl(filePath);
                        finalPdfUrl = urlData.publicUrl;
                    }

                    // 3. 插入数据库
                    const newBook = {
                        isbn: f.isbn,
                        title: f.title,
                        author: f.author || '未知',
                        category: f.category,
                        total: parseInt(f.total),
                        available: parseInt(f.total),
                        location: f.location || '密集书库',
                        cover: f.cover || 'https://via.placeholder.com/300x400?text=No+Cover',
                        pdf_url: finalPdfUrl
                    };

                    const { error } = await supabase.from('books').insert([newBook]);
                    if (error) throw error;

                    alert("✅ 云端实时同步成功！PDF 资源已嵌套。");
                    setPdfFile(null);
                    setF({ title: '', isbn: '', author: '', category: '计算机科学', total: 5, cover: '', location: '' });
                } catch (err) {
                    alert("操作失败：" + (err.message || err));
                } finally {
                    setIsUploading(false);
                }
            };

            return (
                <div className="max-w-3xl mx-auto animate-in">
                    <div className="text-center mb-10">
                        <h2 className="text-3xl font-black text-slate-800">新文献入库编目</h2>
                        <p className="text-slate-500 text-sm mt-2">录入数据将实时同步至云端馆藏库</p>
                    </div>
                    <form onSubmit={submit} className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 grid grid-cols-2 gap-6 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-purple-50 rounded-bl-[100px] -z-10"></div>
                        
                        <Field label="标准书号 (ISBN)" value={f.isbn} onChange={v=>setF({...f, isbn: v})} placeholder="如: 978-7-302-..." />
                        <Field label="文献正题名" value={f.title} onChange={v=>setF({...f, title: v})} placeholder="书名" />
                        <Field label="责任者 (作者)" value={f.author} onChange={v=>setF({...f, author: v})} placeholder="作者编者" />
                        <Field label="中图分类号/类别" value={f.category} onChange={v=>setF({...f, category: v})} />
                        <Field label="物理馆藏架位" value={f.location} onChange={v=>setF({...f, location: v})} placeholder="如: 北馆 3F-A1区" />
                        <Field label="入库复本量" type="number" value={f.total} onChange={v=>setF({...f, total: v})} />

                        {/* 封面上传（原有） */}
                        <div className="col-span-2 space-y-3 p-5 bg-slate-50/50 rounded-2xl border border-slate-100">
                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">书影采集 (封面图)</label>
                            <div className="flex flex-col md:flex-row items-center gap-6">
                                {f.cover ? (
                                    <img src={f.cover} alt="预览" className="w-28 h-36 object-cover rounded-xl shadow-md border border-slate-200" />
                                ) : (
                                    <div className="w-28 h-36 border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center text-slate-300 bg-white">
                                        <Icon name="image" size={24} />
                                    </div>
                                )}
                                <div className="flex-1 w-full space-y-3">
                                    <input type="file" accept="image/*" onChange={handleFileSelect}
                                        className="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-white file:text-purple-600 file:shadow-sm hover:file:bg-purple-50 transition-all cursor-pointer" />
                                    <div className="flex items-center gap-2">
                                        <hr className="flex-1 border-slate-200"/>
                                        <span className="text-xs text-slate-400 font-medium uppercase">OR</span>
                                        <hr className="flex-1 border-slate-200"/>
                                    </div>
                                    <input type="text" value={f.cover && !f.cover.startsWith('data:') ? f.cover : ''} 
                                        onChange={e => setF({...f, cover: e.target.value})}
                                        placeholder="在此粘贴网络图片 URL 链接"
                                        className="w-full p-3 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 ring-purple-500 outline-none transition-all shadow-sm" />
                                </div>
                            </div>
                        </div>

                        {/* PDF 文件选择器 */}
                        <div className="col-span-2 space-y-3 p-5 bg-slate-50/50 rounded-2xl border border-slate-100">
                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">电子书 PDF 上传</label>
                            <div className="flex flex-col md:flex-row items-center gap-6">
                                {pdfFile ? (
                                    <div className="w-40 h-12 bg-emerald-50 border border-emerald-200 rounded-2xl flex items-center justify-center text-emerald-700 font-medium text-sm gap-2 px-4">
                                        <Icon name="file-text" size={20} />
                                        {pdfFile.name.length > 22 ? pdfFile.name.substring(0, 19) + '...' : pdfFile.name}
                                    </div>
                                ) : (
                                    <div className="w-40 h-12 border-2 border-dashed border-slate-200 rounded-2xl flex items-center justify-center text-slate-300 bg-white">
                                        <Icon name="file" size={24} />
                                    </div>
                                )}
                                <div className="flex-1 w-full">
                                    <input 
                                        type="file" 
                                        accept="application/pdf" 
                                        onChange={e => {
                                            const file = e.target.files[0];
                                            if (file) {
                                                if (file.type !== 'application/pdf') {
                                                    alert('仅支持 PDF 格式文件！');
                                                    return;
                                                }
                                                setPdfFile(file);
                                            }
                                        }}
                                        className="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-white file:text-purple-600 file:shadow-sm hover:file:bg-purple-50 transition-all cursor-pointer" 
                                    />
                                </div>
                            </div>
                            {pdfFile && <p className="text-xs text-emerald-600 mt-1">已选中 • {(pdfFile.size / 1024 / 1024).toFixed(2)} MB</p>}
                        </div>

                        {/* 【优化】提交按钮 - 带 Loading 状态 */}
                        <button 
                            type="submit" 
                            disabled={isUploading}
                            className="col-span-2 py-4 thu-purple text-white rounded-2xl font-bold mt-4 shadow-lg shadow-purple-200 active:scale-95 transition-all text-lg tracking-wide disabled:opacity-70 flex items-center justify-center gap-2"
                        >
                            {isUploading ? (
                                <>
                                    <Icon name="loader-2" size={20} className="animate-spin" />
                                    上传中...
                                </>
                            ) : (
                                <>
                                    <Icon name="save" className="inline-block -mt-1" size={20} /> 
                                    确认入库并发布
                                </>
                            )}
                        </button>
                    </form>
                </div>
            );
        }

        // --- 基础组件 ---

        const NavBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl font-bold transition-all ${active ? 'thu-purple text-white shadow-md' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'}`}>
                <Icon name={icon} size={18} className={active ? 'text-white' : ''} />
                <span className="text-sm">{label}</span>
            </button>
        );

        const Field = ({ label, value, onChange, type="text", placeholder, disabled=false }) => (
            <div className="space-y-1.5">
                <label className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">{label}</label>
                <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled} className="w-full p-3.5 bg-slate-50 border-none rounded-xl text-sm focus:ring-2 ring-purple-500 outline-none transition-all disabled:opacity-50 disabled:cursor-not-allowed" required />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
